name: Registry Check

on:
  deployment_status:

jobs:
  registry-check:
    name: Test registry components
    runs-on: ubuntu-latest

    # Only run when Vercel deployment is successful
    if: github.event.deployment_status.state == 'success'

    steps:
      - name: Checkout SolarUI
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create clean Next.js project
        run: |
          npx create-next-app@latest /tmp/solar-registry-test \
            --typescript \
            --tailwind \
            --eslint \
            --app \
            --no-src-dir \
            --import-alias "@/*" \
            --yes

      - name: Run registry tests
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          bash scripts/test-registry.sh \
            --workdir /tmp/solar-registry-test \
            --url "${{ github.event.deployment_status.target_url }}"

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: registry-report
          path: /tmp/solar-registry-test/test-registry-report.md
          if-no-files-found: ignore
